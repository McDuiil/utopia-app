<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#007AFF">
<link rel="manifest" href="manifest.json">
<title>Utopia · 减脂备赛助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600&family=JetBrains+Mono:wght@200;300;400&display=swap" rel="stylesheet">
<style>
/* 样式与之前完全一致，此处略去以节省篇幅，实际使用时保留完整样式 */
:root {
  --ios-blue:#007AFF; --ios-green:#34C759; --ios-orange:#FF9500; --ios-red:#FF3B30; --ios-teal:#5AC8FA;
  --bg0:#000000; --bg1:#0a0a0f; --bg2:#111118; --bg3:#1c1c24; --glass:rgba(255,255,255,0.05);
  --text1:#ffffff; --text2:rgba(255,255,255,0.7); --text3:rgba(255,255,255,0.4);
  --mono:'JetBrains Mono', monospace; --sans:'Outfit', sans-serif;
  --card-bg:rgba(255,255,255,0.05);
  --border-light:rgba(255,255,255,0.1);
  --ring-bg:rgba(255,255,255,0.05);
  --net-bg:rgba(90,200,250,0.1);
}
[data-theme="light"] {
  --bg0:#f5f5f7; --bg1:#e8e8ed; --bg2:#ffffff; --bg3:#f0f0f2; --glass:rgba(0,0,0,0.03);
  --text1:#000000; --text2:rgba(0,0,0,0.7); --text3:rgba(0,0,0,0.4);
  --card-bg:rgba(0,0,0,0.02);
  --border-light:rgba(0,0,0,0.1);
  --ring-bg:rgba(0,0,0,0.05);
  --net-bg:rgba(0,122,255,0.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{ background:var(--bg0); color:var(--text1); font-family:var(--sans); padding-bottom:120px; overflow-x:hidden; transition:background 0.3s, color 0.3s; }
.hidden{ display:none !important; }
.app-container{ max-width:480px; margin:0 auto; padding:20px; }
.header{ display:flex; flex-direction:column; align-items:flex-start; margin-bottom:20px; gap:8px; }
.header h1{ font-weight:200; font-size:24px; letter-spacing:-1px; }
.btn-group{ display:flex; gap:5px; flex-wrap:nowrap; justify-content:flex-end; }
.icon-btn{ background:var(--glass); border:1px solid var(--border-light); padding:6px 8px; border-radius:12px; color:var(--text2); font-size:11px; cursor:pointer; transition:0.2s; flex-shrink:1; white-space:nowrap; }
.timeline{ display:flex; gap:10px; overflow-x:auto; padding-bottom:15px; margin-bottom:10px; scrollbar-width:none; }
.time-btn{ flex:0 0 55px; height:70px; background:var(--glass); border-radius:18px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; border:1px solid transparent; position:relative; }
.time-btn.active{ background:var(--ios-blue); border-color:var(--ios-teal); }
.t-date{ font-family:var(--mono); font-size:18px; }
.t-day{ font-size:10px; opacity:0.6; }
.t-mode{ font-size:8px; margin-top:2px; color:var(--ios-teal); opacity:0.8; }
.dashboard{ background:var(--glass); border-radius:32px; padding:24px; border:1px solid var(--border-light); backdrop-filter:blur(20px); margin:10px 0 20px; position:relative; }
.weight-badge{ position:absolute; top:20px; right:20px; background:rgba(52,199,89,0.1); padding:6px 12px; border-radius:20px; border:1px solid rgba(52,199,89,0.2); font-family:var(--mono); font-size:12px; color:var(--ios-green); cursor:pointer; }
.ring-box{ width:150px; height:150px; margin:0 auto 20px; position:relative; }
.ring-svg{ transform:rotate(-90deg); width:150px; height:150px; }
.ring-bg{ fill:none; stroke:var(--ring-bg); stroke-width:8; }
.ring-fill{ fill:none; stroke:url(#grad); stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 0.8s ease; }
.ring-info{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ring-val{ font-family:var(--mono); font-size:32px; font-weight:200; }
.macro-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.macro-chip{ background:var(--card-bg); padding:10px; border-radius:18px; border:1px solid var(--border-light); }
.mc-label{ font-size:9px; color:var(--text3); text-transform:uppercase; margin-bottom:4px; }
.mc-val{ font-family:var(--mono); font-size:14px; }
.mc-bar{ height:3px; background:rgba(255,255,255,0.05); border-radius:2px; margin:6px 0; overflow:hidden; }
.mc-fill{ height:100%; transition:width 0.5s; }
.section-title{ font-size:11px; color:var(--text3); margin:24px 0 12px 4px; letter-spacing:1px; text-transform:uppercase; display:flex; justify-content:space-between; align-items:center; }
.edit-meal-icon { font-size:12px; cursor:pointer; color:var(--ios-teal); padding:4px 8px; border-radius:12px; background:rgba(90,200,250,0.1); }
.card{ background:var(--card-bg); border-radius:22px; padding:16px; margin-bottom:12px; display:flex; flex-direction:column; cursor:pointer; border:1px solid transparent; transition:0.2s; position:relative;}
.card-top{ display:flex; align-items:center; width:100%; }
.card.checked{ background:rgba(52,199,89,0.06); border-color:rgba(52,199,89,0.2); }
.cb-circle{ width:22px; height:22px; border-radius:50%; border:2px solid var(--text3); margin-right:16px; position:relative; flex-shrink:0; cursor:pointer; z-index:10; }
.card.checked .cb-circle{ background:var(--ios-green); border-color:var(--ios-green); }
.card.checked .cb-circle::after{ content:'✓'; color:#fff; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:12px; }
.card-info{ flex:1; }
.card-info h3{ font-size:15px; font-weight:400; margin-bottom:2px; }
.card-info p{ font-size:11px; color:var(--text3); line-height:1.4; }
.ing-tag { display:inline-block; background:rgba(255,255,255,0.05); padding:2px 6px; border-radius:4px; margin-right:4px; margin-top:4px; font-size:10px; color:var(--ios-teal); }
.card-macro { display:flex; gap:8px; margin-top:10px; padding-top:8px; border-top:1px solid var(--border-light); font-family:var(--mono); font-size:10px; }
.macro-tag { padding:2px 8px; border-radius:6px; font-size:10px; }
.macro-tag.carb { background:rgba(0,122,255,0.12); color:var(--ios-blue); }
.macro-tag.prot { background:rgba(52,199,89,0.12); color:var(--ios-green); }
.macro-tag.fat  { background:rgba(255,149,0,0.12);  color:var(--ios-orange); }
.train-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.train-tag { background: rgba(90,200,250,0.2); color: var(--ios-teal); padding: 2px 8px; border-radius: 12px; font-size: 10px; }
.overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(25px); z-index:2000; display:flex; align-items:center; justify-content:center; padding:20px; }
.panel{ background:var(--bg2); width:100%; max-width:480px; border-radius:32px; padding:28px; border:1px solid var(--border-light); box-shadow:0 20px 40px rgba(0,0,0,0.4); max-height:85vh; overflow-y:auto; }
.ios-input{ width:100%; background:var(--bg3); border:1px solid var(--border-light); padding:16px; border-radius:18px; color:var(--text1); font-size:32px; text-align:center; outline:none; font-family:var(--mono); }
select.ios-input { -webkit-appearance: none; appearance: none; text-align-last: center; }
.primary-btn{ width:100%; background:var(--ios-blue); border:none; padding:18px; border-radius:18px; color:#fff; font-weight:600; font-size:16px; cursor:pointer; }
.secondary-btn{ background:rgba(255,255,255,0.1); border:1px solid var(--border-light); }
.tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0 25px; }
.tag-chip { background: rgba(255,255,255,0.05); color: var(--text2); padding: 8px 16px; border-radius: 20px; font-size: 13px; border: 1px solid transparent; transition: 0.2s; cursor: pointer; }
.tag-chip.active { background: rgba(0,122,255,0.15); color: var(--ios-blue); border-color: rgba(0,122,255,0.4); font-weight: 500; }
.quick-adj { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; }
.history-scroll { max-height: 400px; overflow-y: auto; margin-top: 10px; }
.history-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border-light); cursor: pointer; }
.footer-check{ position:fixed; bottom:30px; left:50%; transform:translateX(-50%); width:calc(100% - 40px); max-width:440px; }
.confirm-btn{ width:100%; padding:18px; border-radius:20px; border:none; font-weight:600; font-size:15px; background:var(--glass); color:var(--text3); transition:0.3s; }
.confirm-btn.ready{ background:var(--ios-green); color:#fff; }
.net-cal { text-align: center; margin-top: 12px; font-family: var(--mono); font-size: 13px; background: var(--net-bg); padding: 6px 12px; border-radius: 20px; display: inline-block; width: auto; margin-left: auto; margin-right: auto; }
.checkbox-label { display: flex; align-items: center; gap: 8px; margin: 15px 0; font-size: 14px; color: var(--text2); cursor: pointer; }
.tab-bar { display: flex; gap: 8px; border-bottom: 1px solid var(--border-light); margin-bottom: 20px; flex-wrap:wrap; }
.tab-btn { background: none; border: none; padding: 8px 16px; font-size: 14px; color: var(--text3); cursor: pointer; transition: 0.2s; }
.tab-btn.active { color: var(--ios-blue); border-bottom: 2px solid var(--ios-blue); }
.goal-progress { margin: 15px 0; background: var(--card-bg); border-radius: 16px; padding: 12px; }
.progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin: 8px 0; overflow: hidden; }
.progress-fill { height: 100%; background: var(--ios-green); width: 0%; transition: width 0.3s; }
.ingredient-item { display: flex; gap: 8px; margin: 8px 0; align-items: center; }
.ingredient-item input { flex: 1; background: var(--bg3); border: 1px solid var(--border-light); padding: 8px; border-radius: 12px; color: var(--text1); }
.ingredient-item button { background: var(--ios-red); border: none; padding: 4px 10px; border-radius: 8px; color: white; cursor: pointer; }
.suggestion-card { background: rgba(52,199,89,0.1); border-left: 3px solid var(--ios-green); padding: 12px; margin: 15px 0; border-radius: 12px; }
.macro-input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
.macro-input-group input { background: var(--bg3); border: 1px solid var(--border-light); padding: 8px; border-radius: 12px; color: var(--text1); text-align: center; }
.jump-date { display: flex; gap: 8px; margin-bottom: 15px; align-items: center; }
.jump-date input { flex: 1; font-size: 14px; padding: 8px; }
.history-edit-btn { background: none; border: none; color: var(--ios-blue); cursor: pointer; font-size: 12px; margin-left: 8px; padding: 4px 6px; border-radius: 12px; background: rgba(0,122,255,0.1); }
.danger-btn { background: var(--ios-red); color: white; border: none; margin-top: 15px; }
</style>
</head>
<body>

<div class="app-container">
  <header class="header">
    <h1>Utopia <span id="display-date" style="font-size:12px; color:var(--text3); font-family:var(--mono);"></span></h1>
    <div class="btn-group">
        <button class="icon-btn" id="theme-btn">🌓 主题</button>
        <button class="icon-btn" id="profile-btn">👤 档案</button>
        <button class="icon-btn" id="sync-btn">☁️ 同步</button>
        <button class="icon-btn" id="history-btn">📊 历史</button>
        <button class="icon-btn" id="analysis-btn">📈 分析</button>
        <button class="icon-btn" id="plan-btn">⚙️ 方案</button>
    </div>
  </header>

  <div class="timeline" id="timeline"></div>

  <div class="dashboard">
    <div id="weight-display" class="weight-badge">-- kg</div>
    <div class="ring-box">
      <svg class="ring-svg">
        <defs><linearGradient id="grad"><stop offset="0%" stop-color="var(--ios-blue)"/><stop offset="100%" stop-color="var(--ios-teal)"/></linearGradient></defs>
        <circle class="ring-bg" cx="75" cy="75" r="52" />
        <circle id="ring-fill" class="ring-fill" cx="75" cy="75" r="52" stroke-dasharray="326.7" stroke-dashoffset="326.7" />
      </svg>
      <div class="ring-info">
        <div class="ring-val" id="kcal-in">0</div>
        <div style="font-size:10px; color:var(--text3)">IN / <span id="kcal-target">0</span></div>
      </div>
    </div>
    <div class="macro-grid">
      <div class="macro-chip" data-type="carb"><div class="mc-label">碳水</div><div class="mc-val">0g</div><div class="mc-bar"><div class="mc-fill" style="background:var(--ios-blue); width:0%"></div></div><div class="mc-target" style="font-size:9px; color:var(--text3)">/ 0g</div></div>
      <div class="macro-chip" data-type="protein"><div class="mc-label">蛋白</div><div class="mc-val">0g</div><div class="mc-bar"><div class="mc-fill" style="background:var(--ios-green); width:0%"></div></div><div class="mc-target" style="font-size:9px; color:var(--text3)">/ 0g</div></div>
      <div class="macro-chip" data-type="fat"><div class="mc-label">脂肪</div><div class="mc-val">0g</div><div class="mc-bar"><div class="mc-fill" style="background:var(--ios-orange); width:0%"></div></div><div class="mc-target" style="font-size:9px; color:var(--text3)">/ 0g</div></div>
    </div>
    <div class="net-cal" id="net-calorie-display">🔥 净赤字: 0 kcal</div>
  </div>

  <div class="section-title" id="sec-title">计划执行</div>
  <div id="meal-list"></div>

  <div class="section-title">运动消耗</div>
  <div id="train-list"></div>
</div>

<div class="footer-check"><button id="final-btn" class="confirm-btn">等待任务完成</button></div>

<div id="train-overlay" class="overlay hidden">
    <div class="panel">
        <h2 id="train-modal-title" style="margin-bottom:8px; font-weight:400; font-size:20px;"></h2>
        <p style="font-size:12px; color:var(--text3); margin-bottom:15px;" id="train-modal-desc"></p>
        <div class="tag-container" id="tag-box"></div>
        <div class="quick-adj">
            <input type="number" id="train-modal-input" class="ios-input" placeholder="0">
            <div style="display:flex; flex-direction:column; gap:6px;">
                <button class="icon-btn" id="train-plus50">+50</button>
                <button class="icon-btn" id="train-minus50">-50</button>
            </div>
        </div>
        <button class="primary-btn" id="train-save">确认录入</button>
        <button id="train-close" style="width:100%; color:var(--text3); border:none; background:none; margin-top:18px; font-size:14px;">返回</button>
    </div>
</div>

<div id="base-overlay" class="overlay hidden">
    <div class="panel" id="base-panel-content"></div>
</div>

  };
  const DB_KEY = "utopia_v10";
  const GIST_FILENAME = 'utopia_data.json';

  // ------------------- 细粒度合并函数 -------------------
  function safeMerge(remote, local) {
    // remote: 远程数据（旧），local: 本地新数据
    // 返回合并后的对象，以 local 为准，但保留 remote 中 local 没有的字段，并特殊处理 days
    if (!remote) return local;
    const output = { ...remote };

    // 1. 处理顶层普通字段（非 days 且非 profile 的字段）
    for (let key in local) {
      if (key === 'days' || key === 'profile') continue;
      // 如果是对象，递归合并，否则直接覆盖
      if (local[key] && typeof local[key] === 'object' && !Array.isArray(local[key])) {
        output[key] = safeMerge(remote[key], local[key]);
      } else {
        output[key] = local[key];
      }
    }

    // 2. 处理 profile
    if (local.profile) {
      if (!output.profile) output.profile = {};
      output.profile = safeMerge(remote.profile, local.profile);
    }

    // 3. 处理 days（最关键的合并）
    if (local.days) {
      if (!output.days) output.days = {};
      for (let dateKey in local.days) {
        const remoteDay = output.days[dateKey] || {};
        const localDay = local.days[dateKey];
        output.days[dateKey] = mergeDay(remoteDay, localDay);
      }
    }

    return output;
  }

  function mergeDay(remoteDay, localDay) {
    const merged = { ...remoteDay };
    // checked: 数组取并集，去重
    if (localDay.checked && Array.isArray(localDay.checked)) {
      const set = new Set([...(remoteDay.checked || []), ...localDay.checked]);
      merged.checked = Array.from(set);
    } else {
      merged.checked = localDay.checked || remoteDay.checked || [];
    }
    // s, c: 如果本地有值且大于0，用本地；否则用远程
    if (localDay.s !== undefined && localDay.s > 0) merged.s = localDay.s;
    else if (remoteDay.s !== undefined) merged.s = remoteDay.s;
    if (localDay.c !== undefined && localDay.c > 0) merged.c = localDay.c;
    else if (remoteDay.c !== undefined) merged.c = remoteDay.c;
    // ps, pc: 字符串，取并集（去重）
    if (localDay.ps !== undefined || remoteDay.ps !== undefined) {
      const localTags = localDay.ps ? localDay.ps.split(',').map(t => t.trim()).filter(Boolean) : [];
      const remoteTags = remoteDay.ps ? remoteDay.ps.split(',').map(t => t.trim()).filter(Boolean) : [];
      const allTags = [...new Set([...remoteTags, ...localTags])];
      merged.ps = allTags.join(',');
    }
    if (localDay.pc !== undefined || remoteDay.pc !== undefined) {
      const localTags = localDay.pc ? localDay.pc.split(',').map(t => t.trim()).filter(Boolean) : [];
      const remoteTags = remoteDay.pc ? remoteDay.pc.split(',').map(t => t.trim()).filter(Boolean) : [];
      const allTags = [...new Set([...remoteTags, ...localTags])];
      merged.pc = allTags.join(',');
    }
    // w: 如果本地有值（非空），用本地；否则用远程
    if (localDay.w !== undefined && localDay.w !== null && localDay.w !== 0) merged.w = localDay.w;
    else if (remoteDay.w !== undefined) merged.w = remoteDay.w;
    // done: 如果任一为 true，则为 true
    merged.done = !!(localDay.done || remoteDay.done);
    // p, m, bmr: 以本地为准，但若本地无则用远程
    merged.p = localDay.p !== undefined ? localDay.p : remoteDay.p;
    merged.m = localDay.m !== undefined ? localDay.m : remoteDay.m;
    merged.bmr = localDay.bmr !== undefined ? localDay.bmr : remoteDay.bmr;
    // customMeals: 合并对象，本地覆盖远程，但保留远程中本地没有的 meal 索引
    if (localDay.customMeals || remoteDay.customMeals) {
      merged.customMeals = { ...(remoteDay.customMeals || {}) };
      for (let mealIdx in (localDay.customMeals || {})) {
        merged.customMeals[mealIdx] = localDay.customMeals[mealIdx];
      }
    }
    // 其他字段（如 stats）可以忽略，因为会动态重新计算
    return merged;
  }

  // ------------------- Gist 云同步 -------------------
  function getGistConfig() {
    return {
      token: localStorage.getItem('utopia_github_token') || '',
      gistId: localStorage.getItem('utopia_gist_id') || ''
    };
  }

  async function gistLoad(token, gistId) {
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) throw new Error('读取失败 ' + res.status);
    const data = await res.json();
    const file = data.files[GIST_FILENAME];
    if (file && file.content) return JSON.parse(file.content);
    return null;
  }

  // 修改后的 gistSave：先拉取远程，用 safeMerge 合并，再写入
  async function gistSave(token, gistId, localState) {
    let remoteState = null;
    try {
      remoteState = await gistLoad(token, gistId);
    } catch (e) {
      console.warn('拉取远程数据失败，将直接写入本地', e);
    }
    const finalState = remoteState ? safeMerge(remoteState, localState) : localState;
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(finalState, null, 2) } } })
    });
    if (!res.ok) throw new Error('写入失败 ' + res.status);
  }

  async function gistCreate(token, state) {
    const res = await fetch('https://api.github.com/gists', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        description: 'Utopia 减脂备赛助手数据',
        public: false,
        files: { [GIST_FILENAME]: { content: JSON.stringify(state, null, 2) } }
      })
    });
    if (!res.ok) throw new Error('创建失败 ' + res.status);
    const data = await res.json();
    return data.id;
  }

  // 打开云同步设置面板（优化版：不再手动合并，只验证连接）

    showBasePanel(html);

    document.getElementById('saveSyncBtn').addEventListener('click', async () => {
      const token = document.getElementById('syncToken').value.trim();
      let gistId = document.getElementById('syncGistId').value.trim();
      const statusEl = document.getElementById('syncStatus');
      if (!token) { statusEl.innerText = '❌ 请输入 Token'; return; }

      try {
        if (!gistId) {
          statusEl.innerText = '🔄 创建新 Gist...';
          gistId = await gistCreate(token, S);

        } else {
          // 已有 Gist ID：只验证连接，不修改本地 S（避免提前合并）
          statusEl.innerText = '🔄 验证连接...';
          await gistLoad(token, gistId);
          statusEl.innerText = '✅ 连接成功！正在保存配置...';
        }
        localStorage.setItem('utopia_github_token', token);
        localStorage.setItem('utopia_gist_id', gistId);
        // 调用 gistSave，内部会拉取远程并安全合并
        await gistSave(token, gistId, S);
        // 合并后重新加载本地 S（使当前页面拥有最新数据）
        const latest = await gistLoad(token, gistId);
        if (latest) {
          S = latest;
          if (!S.statsCache) S.statsCache = {};
          for (let k in S.days) migrateDay(S.days[k]);
          localStorage.setItem(DB_KEY, JSON.stringify(S));

  // 默认数据结构
  const defaultState = {
    version: 2,
    phase: 1, mode: 'train',
    inheritPrevious: true,
    profile: {
      gender: 'male', age: 30, height: 175, weight: 75,
      customBMR: null, useCustom: false,
      goalWeight: 70, goalDeficit: 500, goalBodyFat: 12,
      bodyFat: null
    },
    days: {},
    statsCache: {}
  };

  let S = { ...defaultState };
  let activeK = getK(new Date());
  let currentTrainType = null;

  // ------------------- 辅助函数（保持不变） -------------------
  function getK(date) {
    const d = new Date(date);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function save() {
    localStorage.setItem(DB_KEY, JSON.stringify(S));
    const cfg = getGistConfig();
    if (cfg.token && cfg.gistId) {
      gistSave(cfg.token, cfg.gistId, S).catch(e => console.warn('Gist 保存失败:', e));
    }
  }

  async function loadState() {
    const cfg = getGistConfig();
    if (cfg.token && cfg.gistId) {
      try {
        const remote = await gistLoad(cfg.token, cfg.gistId);
        if (remote && typeof remote === 'object') {
          S = remote;
          if (!S.statsCache) S.statsCache = {};
          for (let k in S.days) migrateDay(S.days[k]);
          localStorage.setItem(DB_KEY, JSON.stringify(S));
          return;
        }
      } catch(e) { console.warn('Gist 加载失败，回退到本地:', e); }
    }
    const stored = localStorage.getItem(DB_KEY);
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        if (!parsed.profile.bodyFat) parsed.profile.bodyFat = null;
        if (parsed.profile.customBmr !== undefined && parsed.profile.customBMR === undefined) {
          parsed.profile.customBMR = parsed.profile.customBmr;
          delete parsed.profile.customBmr;
        }
        S = parsed;
      } catch(e) { console.warn(e); }
    } else {
      S = JSON.parse(JSON.stringify(defaultState));
    }
    if (!S.statsCache) S.statsCache = {};
    for (let k in S.days) migrateDay(S.days[k]);
  }

  function migrateDay(day) {
    if (day.customMeals === undefined) day.customMeals = {};
    if (day.stats === undefined) day.stats = {};
    if (day.bmr === undefined) day.bmr = calculateBMR(S.profile);
    return day;
  }

  function calculateBMR(profile) {
    if (profile.useCustom && profile.customBMR !== null && profile.customBMR > 0) return profile.customBMR;
    const w = profile.weight, h = profile.height, a = profile.age;
    if (!w || !h || !a) return 0;
    if (profile.gender === 'male') return Math.round(10*w + 6.25*h - 5*a + 5);
    else return Math.round(10*w + 6.25*h - 5*a - 161);
  }

  function getPlan(phase, mode) {
    if (!MATRIX[phase] || !MATRIX[phase][mode]) {
      console.warn(`方案不存在: phase=${phase}, mode=${mode}, 回退到默认`);
      return MATRIX[1].train;
    }
    return MATRIX[phase][mode];
  }

  function getDay(k) {
    if (!S.days[k]) {
      let p = S.phase, m = S.mode;
      if (S.inheritPrevious) {
        const prevDates = Object.keys(S.days).sort().reverse();
        if (prevDates.length > 0) {
          const prevDay = S.days[prevDates[0]];
          p = prevDay.p !== undefined ? prevDay.p : p;
          m = prevDay.m !== undefined ? prevDay.m : m;
        }
      }
      S.days[k] = migrateDay({
        checked: [], s: 0, ps: '', c: 0, pc: '', w: 0, done: false,
        p: p, m: m,
        bmr: calculateBMR(S.profile),
        customMeals: {}
      });
      save();
    }
    const day = S.days[k];
    if (day.customMeals === undefined) migrateDay(day);
    if (day.bmr === undefined) day.bmr = calculateBMR(S.profile);
    return day;
  }

  function getMeal(plan, idx, customMeals) {
    const custom = customMeals[idx];
    if (custom && custom.k !== undefined && !isNaN(custom.k)) return custom;
    return plan.meals[idx];
  }

  function updateStatsForDate(k) {
    const d = S.days[k];
    const plan = getPlan(d.p, d.m);
    const mealList = d.customMeals._mealList;
    const meals = mealList || plan.meals;
    let intake = 0;
    d.checked.forEach(idx => {
      const m = mealList ? (meals[idx] || {k:0}) : getMeal(plan, idx, d.customMeals);
      intake += m.k;
    });
    const bmr = d.bmr || calculateBMR(S.profile);
    const deficit = intake - (bmr + d.s + d.c);
    S.statsCache[k] = {
      deficit,
      mealsDone: d.checked.length,
      totalMeals: meals.length,
      sportCompleted: (d.s > 0 || d.ps) || (d.c > 0 || d.pc),
      intake
    };
    save();
  }

  function getStats(k) {
    if (!S.statsCache[k]) updateStatsForDate(k);
    return S.statsCache[k];
  }

  function isStrengthValid(d) { return d.s > 0 || (d.ps && d.ps.trim() !== ''); }
  function isCardioValid(d) { return d.c > 0 || (d.pc && d.pc.trim() !== ''); }

  function getNetDeficit(d, plan) {
    let intake = 0;
    d.checked.forEach(idx => {
      const m = getMeal(plan, idx, d.customMeals);
      intake += m.k;
    });
    const bmr = d.bmr || calculateBMR(S.profile);
    return intake - (bmr + d.s + d.c);
  }

  function isDayComplete(d, plan) {
    const mealList = d.customMeals._mealList;
    const totalMeals = mealList ? mealList.length : plan.meals.length;
    return d.checked.length === totalMeals && (isStrengthValid(d) || isCardioValid(d));
  }

  function estimateFromIngredients(ings) {
    let totalKcal = 0, totalCarb = 0, totalProt = 0, totalFat = 0;
    for (let ig of ings) {
      let name = ig.n.trim();
      let amountStr = ig.a.trim();
      let amountNum = parseFloat(amountStr);
      if (isNaN(amountNum)) continue;
      let food = FOOD_DB[name];
      if (food) {
        let multiplier = amountNum;
        if (food.unit === "个") multiplier = amountNum;
        else multiplier = amountNum / 100;
        totalKcal += food.kcal * multiplier;
        totalCarb += food.carb * multiplier;
        totalProt += food.protein * multiplier;
        totalFat += food.fat * multiplier;
      }
    }
    return { kcal: totalKcal, carb: totalCarb, prot: totalProt, fat: totalFat };
  }

  // ------------------- 渲染函数（保持不变） -------------------
  function renderAll() {

    function renderTrain(d) {

  function renderDashboard(d, plan) {
    let cur = {k:0, c:0, p:0, f:0};
    d.checked.forEach(idx => {
      const m = getMeal(plan, idx, d.customMeals);
      cur.k += m.k; cur.c += m.c; cur.p += m.p; cur.f += m.f;
    });
    document.getElementById('kcal-in').innerText = Math.round(cur.k);
    document.getElementById('kcal-target').innerText = plan.total.k;
    const percent = Math.min(cur.k / plan.total.k, 1);
    const ringFill = document.getElementById('ring-fill');
    if (ringFill) ringFill.style.strokeDashoffset = 326.7 * (1 - percent);

    const map = {carb:['c',plan.total.c], protein:['p',plan.total.p], fat:['f',plan.total.f]};
    for(let key in map) {
      const el = document.querySelector(`[data-type="${key}"]`);
      if (!el) continue;
      el.querySelector('.mc-val').innerText = Math.round(cur[map[key][0]]) + 'g';
      el.querySelector('.mc-target').innerText = `/ ${map[key][1]}g`;
      el.querySelector('.mc-fill').style.width = (Math.min(cur[map[key][0]] / map[key][1], 1) * 100) + '%';
    }

    const net = getNetDeficit(d, plan);
    const netEl = document.getElementById('net-calorie-display');
    netEl.innerText = `🔥 净赤字: ${net >=0 ? '+' : ''}${Math.round(net)} kcal (BMR已计)`;
    netEl.style.color = net < 0 ? 'var(--ios-green)' : (net > 0 ? 'var(--ios-orange)' : 'var(--ios-teal)');
  }

  function renderTimeline() {
    const box = document.getElementById('timeline');
    box.innerHTML = '';
    const today = new Date();
    for(let i=6; i>=0; i--){
      const date = new Date(today);
      date.setDate(today.getDate() - i);
      const k = getK(date);
      const dayData = S.days[k];
      const modeText = dayData ? (dayData.m === 'train' ? '训' : '休') : '';
      const btn = document.createElement('div');
      btn.className = `time-btn ${k===activeK?'active':''}`;
      btn.innerHTML = `<div class="t-day">${date.toLocaleDateString('en-US',{weekday:'short'})}</div><div class="t-date">${date.getDate()}</div>${modeText ? `<div class="t-mode">${modeText}</div>` : ''}`;
      btn.onclick = () => { activeK=k; renderAll(); };
      box.appendChild(btn);
    }
  }

  function updateFooter(d, plan) {
    const btn = document.getElementById('final-btn');
    if(d.done){ btn.innerText="今日达成✓"; btn.className="confirm-btn ready"; return; }
    if(isDayComplete(d, plan)) {
      btn.innerText="确认完成今日计划";
      btn.classList.add('ready');
    } else {
      const _totalM = (d.customMeals._mealList ? d.customMeals._mealList.length : plan.meals.length);
      btn.innerText = `还差 ${_totalM-d.checked.length} 餐或未记录运动`;
      btn.classList.remove('ready');
    }
  }

  function estimateMeal(mealIdx) {

    document.getElementById(`custom-kcal-${mealIdx}`).value = Math.round(est.kcal);
    document.getElementById(`custom-carb-${mealIdx}`).value = Math.round(est.carb);

  function saveCustomMeals() {
    const d = getDay(activeK);
    const mealList = d.customMeals._mealList;

    if (mealList) {
      // 从编辑器 UI 读取最新数据，写回 _mealList
      for (let idx = 0; idx < mealList.length; idx++) {
        const titleInput = document.getElementById(`meal-title-${idx}`);
        const container = document.getElementById(`meal-editor-${idx}`);
        if (!container) continue;

        // 解析标题（emoji + 名称）
        if (titleInput) {
          const raw = titleInput.value.trim();
          // 简单分割：第一个 emoji 作为 i，其余作为 n
          const emojiMatch = raw.match(/^(\p{Emoji_Presentation}|\p{Emoji}️)\s*/u);
          if (emojiMatch) {
            mealList[idx].i = emojiMatch[0].trim();
            mealList[idx].n = raw.slice(emojiMatch[0].length).trim();
          } else {
            mealList[idx].i = '';
            mealList[idx].n = raw;
          }
        }

        // 食材
        const items = container.querySelectorAll('.ingredient-item');
        const ings = [];
        for (let i = 0; i < items.length; i++) {
          const nameInput = items[i].querySelector('[data-field="name"]');
          const amountInput = items[i].querySelector('[data-field="amount"]');
          if (nameInput && amountInput && nameInput.value.trim() && amountInput.value.trim()) {
            ings.push({ n: nameInput.value.trim(), a: amountInput.value.trim() });
          }
        }
        if (ings.length > 0) mealList[idx].ings = ings;

        // 宏量
        const kcal = parseFloat(document.getElementById(`custom-kcal-${idx}`)?.value);
        const carb = parseFloat(document.getElementById(`custom-carb-${idx}`)?.value);
        const prot = parseFloat(document.getElementById(`custom-protein-${idx}`)?.value);
        const fat  = parseFloat(document.getElementById(`custom-fat-${idx}`)?.value);
        if (!isNaN(kcal)) mealList[idx].k = kcal;
        if (!isNaN(carb)) mealList[idx].c = carb;
        if (!isNaN(prot)) mealList[idx].p = prot;
        if (!isNaN(fat))  mealList[idx].f = fat;
      }
      d.customMeals._mealList = mealList;
    } else {
      // 兼容旧逻辑（没有 _mealList 时）
      const plan = getPlan(d.p, d.m);
      for (let mealIdx = 0; mealIdx < plan.meals.length; mealIdx++) {
        const container = document.getElementById(`meal-editor-${mealIdx}`);
        if (!container) continue;
        const items = container.querySelectorAll('.ingredient-item');
        const ings = [];
        for (let i = 0; i < items.length; i++) {
          const nameInput = items[i].querySelector('[data-field="name"]');
          const amountInput = items[i].querySelector('[data-field="amount"]');
          if (nameInput && amountInput && nameInput.value.trim() && amountInput.value.trim()) {
            ings.push({ n: nameInput.value.trim(), a: amountInput.value.trim() });
          }
        }
        const kcal = parseFloat(document.getElementById(`custom-kcal-${mealIdx}`).value);
        const carb = parseFloat(document.getElementById(`custom-carb-${mealIdx}`).value);
        const prot = parseFloat(document.getElementById(`custom-protein-${mealIdx}`).value);
        const fat  = parseFloat(document.getElementById(`custom-fat-${mealIdx}`).value);
        if (ings.length > 0 && !isNaN(kcal) && !isNaN(carb) && !isNaN(prot) && !isNaN(fat)) {
          const original = plan.meals[mealIdx];
          d.customMeals[mealIdx] = { n: original.n, t: original.t, i: original.i, k: kcal, c: carb, p: prot, f: fat, ings: ings };
        } else {
          delete d.customMeals[mealIdx];
        }
      }
    }
    updateStatsForDate(activeK);
    save();
    closeBase();
    renderAll();
  }

  function openHistory() {
    const sorted = Object.keys(S.days).sort().reverse();
    const weightData = sorted.map(k => ({ date: k, weight: S.days[k].w })).filter(d => d.weight);
    const deficitData = [];
    for (let k of sorted) {
      const stats = getStats(k);
      if (stats) deficitData.push({ date: k, deficit: stats.deficit });
    }
    const canvasWidth = 300, canvasHeight = 150;
    const weightCanvasHtml = weightData.length >= 2 ? `<canvas id="weightChart" width="${canvasWidth}" height="${canvasHeight}" style="width:100%; max-width:${canvasWidth}px; height:auto; background:var(--card-bg); border-radius:16px; margin:20px auto;"></canvas>` : '';
    const deficitCanvasHtml = deficitData.length >= 2 ? `<canvas id="deficitChart" width="${canvasWidth}" height="${canvasHeight}" style="width:100%; max-width:${canvasWidth}px; height:auto; background:var(--card-bg); border-radius:16px; margin:20px auto;"></canvas>` : '';
    const listHtml = sorted.map(k => {
      const d = S.days[k];
      const stats = getStats(k);
      const strengthActive = (d.s>0 || d.ps);
      const cardioActive = (d.c>0 || d.pc);
      const deficit = stats ? stats.deficit : 0;
      const modeName = d.m === 'train' ? '训' : '休';
      return `<div class="history-row" data-date="${k}">
        <div style="display:flex; align-items:center; gap:6px;">
          <div style="font-family:var(--mono)">${k.slice(5)}</div>
          <div style="font-size:9px; color:var(--ios-teal); background:rgba(90,200,250,0.2); padding:2px 6px; border-radius:12px;">阶段${d.p}·${modeName}</div>
          <button class="history-edit-btn" data-date="${k}">📝</button>
        </div>
        <div style="flex:1; margin-left:15px; font-size:12px; color:var(--text3)">🍽️${stats?.mealsDone || 0}/${stats?.totalMeals || 0} · 💪${strengthActive?'✓':'✗'} 🏃${cardioActive?'✓':'✗'}</div>
        <div style="font-family:var(--mono); color:${deficit<0?'var(--ios-green)':'var(--ios-orange)'}">${deficit>=0?'+':''}${Math.round(deficit)}</div>
      </div>`;
    }).join('');
    const jumpHtml = `
      <div class="jump-date">
        <input type="date" id="jumpDateInput" value="${getK(new Date())}" style="flex:1; background:var(--bg3); border:1px solid var(--border-light); padding:8px; border-radius:12px; color:var(--text1);">
        <button class="icon-btn" id="jumpDateBtn">跳转</button>
      </div>
    `;
    showBasePanel(`<h2>历史复盘</h2>${jumpHtml}<div class="history-scroll">${weightCanvasHtml}${deficitCanvasHtml}${listHtml}</div><div style="margin-top:15px;"><button class="icon-btn" id="exportDataBtn">📁 导出数据</button> <button class="icon-btn" id="importDataBtn">📂 导入数据</button></div>`);
    document.getElementById('jumpDateBtn')?.addEventListener('click', () => {
      const date = document.getElementById('jumpDateInput').value;
      if (date) {
        activeK = date;
        closeBase();
        renderAll();
      }
    });
    document.querySelectorAll('.history-edit-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const date = btn.dataset.date;
        editDayPlan(date);
      });
    });
    document.querySelectorAll('.history-row').forEach(row => {
      row.addEventListener('click', (e) => {
        if (e.target.classList.contains('history-edit-btn')) return;
        const date = row.dataset.date;
        if (date) {
          activeK = date;
          closeBase();
          renderAll();
        }
      });
    });
    document.getElementById('exportDataBtn')?.addEventListener('click', exportData);
    document.getElementById('importDataBtn')?.addEventListener('click', importData);
    setTimeout(() => {
      if (weightData.length >= 2) drawLineChart(document.getElementById('weightChart'), weightData.map(d=>d.weight));
      if (deficitData.length >= 2) drawLineChart(document.getElementById('deficitChart'), deficitData.map(d=>d.deficit), '#FF9500');
    }, 50);
  }

  function editDayPlan(k) {
    const d = getDay(k);
    const html = `
      <h2>编辑 ${k} 的计划</h2>
      <div style="margin-bottom:15px;">
        <label>阶段 (1-4)</label>
        <select id="phaseEdit" class="ios-input" style="font-size:18px;">
          <option value="1" ${d.p===1?'selected':''}>阶段1 (高碳)</option>
          <option value="2" ${d.p===2?'selected':''}>阶段2 (中碳)</option>
          <option value="3" ${d.p===3?'selected':''}>阶段3 (低碳)</option>
          <option value="4" ${d.p===4?'selected':''}>阶段4 (极低碳)</option>
        </select>
      </div>
      <div style="margin-bottom:25px;">
        <label>模式</label>
        <select id="modeEdit" class="ios-input">
          <option value="train" ${d.m==='train'?'selected':''}>训练日</option>
          <option value="rest" ${d.m==='rest'?'selected':''}>休息日</option>
        </select>
      </div>
      <button class="primary-btn" id="saveDayPlanBtn">保存</button>
    `;
    showBasePanel(html);
    document.getElementById('saveDayPlanBtn').addEventListener('click', () => {
      const d = getDay(k);
      d.p = parseInt(document.getElementById('phaseEdit').value);
      d.m = document.getElementById('modeEdit').value;
      d.checked = [];
      updateStatsForDate(k);
      save();
      closeBase();
      if (activeK === k) renderAll();
      else openHistory();
    });
  }

  function openAnalysis() {
    const sorted = Object.keys(S.days).sort().reverse();
    const last30 = sorted.slice(0,30);
    const recentDays = sorted.slice(0,7);
    let totalCarb=0, totalProt=0, totalFat=0, count=0;
    for (let k of recentDays) {
      const d = S.days[k];
      const plan = getPlan(d.p, d.m);
      if (plan) {
        let cur = {c:0,p:0,f:0};
        d.checked.forEach(idx => {
          const m = getMeal(plan, idx, d.customMeals);
          cur.c += m.c; cur.p += m.p; cur.f += m.f;
        });
        totalCarb += cur.c; totalProt += cur.p; totalFat += cur.f;
        count++;
      }
    }
    const avgCarb = count ? totalCarb/count : 0;
    const avgProt = count ? totalProt/count : 0;
    const avgFat = count ? totalFat/count : 0;
    const pieCanvas = `<canvas id="macroPie" width="200" height="200" style="width:200px; height:200px; margin:0 auto; display:block;"></canvas>`;
    const weekly = getSummary('week');
    const monthly = getSummary('month');
    const heatmapHtml = `<canvas id="heatmapCanvas" width="350" height="180" style="width:100%; max-width:350px; height:auto; background:var(--card-bg); border-radius:16px; margin:20px auto;"></canvas>`;
    const latestWeight = S.days[sorted[0]]?.w || S.profile.weight;
    const weightProgress = ((S.profile.goalWeight - latestWeight) / (S.profile.goalWeight - S.profile.weight) * 100) || 0;
    const todayPlan = getPlan(getDay(activeK).p, getDay(activeK).m);
    const todayDeficit = getNetDeficit(getDay(activeK), todayPlan);
    let bodyFatProgress = 0;
    if (S.profile.bodyFat !== null && S.profile.goalBodyFat > 0) {
      bodyFatProgress = ((S.profile.bodyFat - S.profile.goalBodyFat) / (S.profile.bodyFat - 0)) * 100;
      bodyFatProgress = Math.min(100, Math.max(0, bodyFatProgress));
    }
    let suggestion = '';
    if (sorted.length >= 7) {
      let avgDeficit = 0;
      const last7 = sorted.slice(0,7);
      let totalDeficit = 0;
      for (let k of last7) {
        const stats = getStats(k);
        if (stats) totalDeficit += stats.deficit;
      }
      avgDeficit = totalDeficit / 7;
      const currentPhase = getDay(activeK).p;
      if (avgDeficit > -300 && currentPhase < 4) {
        suggestion = `
          <div class="suggestion-card">
            <strong>💡 阶段建议</strong><br>
            最近7天平均赤字仅 ${Math.round(avgDeficit)} kcal，低于建议值 -300 kcal。<br>
            建议尝试进入阶段 ${currentPhase+1} 以提高减脂效率。
            <button class="icon-btn" style="margin-top:8px;" id="applySuggestionBtn">应用建议</button>
          </div>
        `;
      }
    }

    const html = `
      <div class="tab-bar" id="analysisTabs">
        <button class="tab-btn active" data-tab="goals">🎯 目标</button>
        <button class="tab-btn" data-tab="charts">🥧 营养</button>
        <button class="tab-btn" data-tab="weekly">📅 周月汇总</button>
        <button class="tab-btn" data-tab="heatmap">🔥 热力图</button>
      </div>
      ${suggestion}
      <div id="tabGoals" class="tab-content">
        <div class="goal-progress"><strong>体重目标</strong> ${latestWeight}kg → ${S.profile.goalWeight}kg<div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100, Math.max(0, weightProgress))}%"></div></div></div>
        <div class="goal-progress"><strong>体脂率目标</strong> ${S.profile.bodyFat !== null ? S.profile.bodyFat + '% → ' + S.profile.goalBodyFat + '%' : '未录入 → '+S.profile.goalBodyFat+'%'}<div class="progress-bar"><div class="progress-fill" style="width:${bodyFatProgress}%"></div></div></div>
      </div>
      <div id="tabCharts" class="tab-content hidden">
        <h3>近7天平均宏量占比</h3>
        ${pieCanvas}
      </div>
      <div id="tabWeekly" class="tab-content hidden">
        <h3>本周汇总</h3>
        <p>总赤字: ${weekly.totalDeficit} kcal | 平均赤字: ${weekly.avgDeficit} kcal</p>
        <p>餐食完成率: ${weekly.mealCompletion}% | 运动天数: ${weekly.sportDays}</p>
        <h3>本月汇总</h3>
        <p>总赤字: ${monthly.totalDeficit} kcal | 平均赤字: ${monthly.avgDeficit} kcal</p>
        <p>餐食完成率: ${monthly.mealCompletion}% | 运动天数: ${monthly.sportDays}</p>
      </div>
      <div id="tabHeatmap" class="tab-content hidden">
        ${heatmapHtml}
      </div>
    `;
    showBasePanel(html);
    if (suggestion) {
      document.getElementById('applySuggestionBtn')?.addEventListener('click', () => {
        const newPhase = getDay(activeK).p + 1;
        applyPhaseSuggestion(newPhase);
      });
    }
    setTimeout(() => {
      const pieCanvas = document.getElementById('macroPie');
      if (pieCanvas) drawPieChart(pieCanvas, [avgCarb, avgProt, avgFat], ['碳水', '蛋白', '脂肪']);
      const heatCanvas = document.getElementById('heatmapCanvas');
      if (heatCanvas && last30.length) drawHeatmap(heatCanvas, last30);
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
          document.getElementById(`tab${btn.dataset.tab}`).classList.remove('hidden');
        });
      });
    }, 50);
  }

  function applyPhaseSuggestion(newPhase) {
    const d = getDay(activeK);
    d.p = newPhase;
    d.checked = [];
    if (confirm("是否将全局默认方案也更新为阶段 "+newPhase+"？")) {
      S.phase = newPhase;
    }
    updateStatsForDate(activeK);
    save();
    closeBase();
    renderAll();
    alert(`已将今日方案切换为阶段 ${newPhase}。`);
  }

  function drawPieChart(canvas, values, labels) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    const total = values.reduce((a,b)=>a+b,0);
    if (total === 0) return;
    let start = -Math.PI/2;
    const colors = ['#007AFF', '#34C759', '#FF9500'];
    for (let i=0; i<values.length; i++) {
      const angle = (values[i]/total) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(w/2, h/2);
      ctx.arc(w/2, h/2, Math.min(w,h)/2, start, start+angle);
      ctx.fillStyle = colors[i];
      ctx.fill();
      start += angle;
    }
    let legendY = h-20;
    for (let i=0; i<labels.length; i++) {
      ctx.fillStyle = colors[i];
      ctx.fillRect(w-50, legendY-8, 10, 10);
      ctx.fillStyle = 'var(--text2)';
      ctx.fillText(`${labels[i]} ${Math.round(values[i])}g`, w-38, legendY);
      legendY -= 15;
    }
  }

  function getSummary(period) {
    const now = new Date();
    let start;
    if (period === 'week') {
      start = new Date(now);
      start.setDate(now.getDate() - 7);
    } else {
      start = new Date(now);
      start.setMonth(now.getMonth() - 1);
    }
    const startStr = getK(start);
    let totalDeficit = 0, totalMeals = 0, doneMeals = 0, sportDays = 0, dayCount = 0;
    for (let k in S.days) {
      if (k >= startStr) {
        const stats = getStats(k);
        if (stats) {
          totalDeficit += stats.deficit;
          totalMeals += stats.totalMeals;
          doneMeals += stats.mealsDone;
          if (stats.sportCompleted) sportDays++;
          dayCount++;
        }
      }
    }
    return {
      totalDeficit: Math.round(totalDeficit),
      avgDeficit: dayCount ? Math.round(totalDeficit/dayCount) : 0,
      mealCompletion: totalMeals ? Math.round((doneMeals/totalMeals)*100) : 0,
      sportDays
    };
  }

  function drawHeatmap(canvas, dates) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    const cellSize = 30, margin = 20;
    const startX = margin, startY = margin;
    for (let i=0; i<dates.length && i<35; i++) {
      const k = dates[i];
      const stats = getStats(k);
      let completion = stats ? stats.mealsDone / stats.totalMeals : 0;
      const color = `rgba(52,199,89, ${0.2 + completion*0.8})`;
      const col = i % 7, row = Math.floor(i / 7);
      ctx.fillStyle = color;
      ctx.fillRect(startX + col*cellSize, startY + row*cellSize, cellSize-2, cellSize-2);
      ctx.fillStyle = 'var(--text3)';
      ctx.font = '8px monospace';
      ctx.fillText(k.slice(5), startX + col*cellSize+2, startY + row*cellSize+12);
    }
    ctx.fillStyle = 'var(--text2)';
    ctx.font = '10px monospace';
    ctx.fillText('最近30天完成率热力图 (绿色越深完成越高)', margin, h-5);
  }

  function drawLineChart(canvas, values, color='#34C759') {
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    if (values.length < 2) return;
    const minVal = Math.min(...values);
    const maxVal = Math.max(...values);
    const range = maxVal - minVal || 1;
    const xStep = w / (values.length - 1);
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    values.forEach((v,i) => {
      const x = i * xStep;
      const y = h - 20 - ((v - minVal) / range) * (h - 40);
      if (i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    });
    ctx.stroke();
    values.forEach((v,i) => {
      const x = i * xStep;
      const y = h - 20 - ((v - minVal) / range) * (h - 40);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, 2*Math.PI);
      ctx.fill();
    });
    ctx.fillStyle = 'var(--text3)';
    ctx.font = '9px monospace';
    ctx.fillText(`${Math.round(minVal)}`, 5, h-10);
    ctx.fillText(`${Math.round(maxVal)}`, w-40, 15);
  }

  function exportData() {
    const dataStr = JSON.stringify(S, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `utopia_backup_${getK(new Date())}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = e => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (imported && typeof imported === 'object') {
            S = imported;
            if (!S.version) S.version = 2;
            if (!S.profile.bodyFat) S.profile.bodyFat = null;
            if (!S.statsCache) S.statsCache = {};
            save();
            location.reload();
          } else alert('文件格式错误');
        } catch(e) { alert('解析失败'); }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  function confirmDay() {
    const d = getDay(activeK);
    const plan = getPlan(d.p, d.m);
    if (isDayComplete(d, plan)) {
      d.done = true;
      updateStatsForDate(activeK);
      save();
      renderAll();
    }
  }

  function showBasePanel(html) {
    const panel = document.getElementById('base-panel-content');
    panel.innerHTML = html + `<button id="closeBaseBtn" style="width:100%; color:var(--text3); border:none; background:none; margin-top:20px;">关闭</button>`;
    document.getElementById('closeBaseBtn').addEventListener('click', closeBase);
    document.getElementById('base-overlay').classList.remove('hidden');
  }

  function closeBase() {
    document.getElementById('base-overlay').classList.add('hidden');
  }

  function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    if (current === 'light') {
      html.removeAttribute('data-theme');
      localStorage.setItem('theme', 'dark');
    } else {
      html.setAttribute('data-theme', 'light');
      localStorage.setItem('theme', 'light');
    }
  }

  // ------------------- 初始化与事件绑定 -------------------
  async function init() {
    await loadState();
    if (localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
    renderAll();
    document.getElementById('theme-btn').addEventListener('click', toggleTheme);
    document.getElementById('profile-btn').addEventListener('click', openProfile);
    document.getElementById('sync-btn').addEventListener('click', openSyncSettings);
    document.getElementById('history-btn').addEventListener('click', openHistory);
    document.getElementById('analysis-btn').addEventListener('click', openAnalysis);
    document.getElementById('plan-btn').addEventListener('click', openPlan);
    document.getElementById('weight-display').addEventListener('click', openWeight);
    document.getElementById('final-btn').addEventListener('click', confirmDay);
    document.getElementById('train-save').addEventListener('click', saveTrainInput);
    document.getElementById('train-close').addEventListener('click', closeTrainModal);
    document.getElementById('train-plus50').addEventListener('click', () => adjustTrain(50));
    document.getElementById('train-minus50').addEventListener('click', () => adjustTrain(-50));
    document.getElementById('tag-box').addEventListener('click', (e) => {
      if (e.target.classList.contains('tag-chip')) {
        e.target.classList.toggle('active');
      }
    });
    document.getElementById('sec-title').addEventListener('click', (e) => {
      if (e.target.classList.contains('edit-meal-icon') || e.target.closest('.edit-meal-icon')) {
        openMealEditor();
      }
    });
    let lastDate = getK(new Date());
    function checkDateChange() {
      const today = getK(new Date());
      if (today !== lastDate) {
        lastDate = today;
        activeK = today;
        renderAll();
      }
    }
    setInterval(checkDateChange, 60000);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) checkDateChange(); });
    const today = getK(new Date());
    const dToday = getDay(today);
    if (!dToday.w) setTimeout(() => openWeight(), 500);
  }

  init();
})();
</script>
<script>
// 注销所有旧的 Service Worker，防止缓存干扰
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => reg.unregister());
  });
  caches.keys().then(keys => {
    keys.forEach(key => caches.delete(key));
  });
}
</script>
