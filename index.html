<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#007AFF">
<link rel="manifest" href="manifest.json">
<title>Utopia · 减脂备赛助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600&family=JetBrains+Mono:wght@200;300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="tab-nav">
  <button class="tab-nav-btn active" data-page="main">🏠 主页</button>
  <button class="tab-nav-btn" data-page="sport">💪 运动</button>
  <button class="tab-nav-btn" data-page="history">📊 历史</button>
  <button class="tab-nav-btn" data-page="analysis">📈 分析</button>
</nav>

<div id="page-main" class="page-view">
<div class="app-container" style="padding-top:0;">
  <header class="header">
    <div class="header-top">
      <h1>Utopia <span id="display-date" style="font-size:12px; color:var(--text3); font-family:var(--mono);"></span></h1>
      <div class="header-actions">
        <button class="icon-btn" id="theme-btn">🌓</button>
        <button class="icon-btn" id="profile-btn">👤</button>
        <button class="icon-btn" id="sync-btn">☁️</button>
        <button class="icon-btn" id="plan-btn">⚙️</button>
      </div>
    </div>
  </header>
  
  <div class="timeline" id="timeline"></div>

  <div class="dashboard">
    <div id="weight-display" class="weight-badge">-- kg</div>
    <div class="ring-box">
      <svg class="ring-svg">
        <defs><linearGradient id="grad"><stop offset="0%" stop-color="var(--ios-blue)"/><stop offset="100%" stop-color="var(--ios-teal)"/></linearGradient></defs>
        <circle class="ring-bg" cx="75" cy="75" r="52" />
        <circle id="ring-fill" class="ring-fill" cx="75" cy="75" r="52" stroke-dasharray="326.7" stroke-dashoffset="326.7" />
      </svg>
      <div class="ring-info">
        <div class="ring-val" id="kcal-in">0</div>
        <div style="font-size:10px; color:var(--text3)">IN / <span id="kcal-target">0</span></div>
      </div>
    </div>
    <div class="macro-grid">
      <div class="macro-chip" data-type="carb"><div class="mc-label">碳水</div><div class="mc-val">0g</div><div class="mc-bar"><div class="mc-fill" style="background:var(--ios-blue); width:0%"></div></div><div class="mc-target" style="font-size:9px; color:var(--text3)">/ 0g</div></div>
      <div class="macro-chip" data-type="protein"><div class="mc-label">蛋白</div><div class="mc-val">0g</div><div class="mc-bar"><div class="mc-fill" style="background:var(--ios-green); width:0%"></div></div><div class="mc-target" style="font-size:9px; color:var(--text3)">/ 0g</div></div>
      <div class="macro-chip" data-type="fat"><div class="mc-label">脂肪</div><div class="mc-val">0g</div><div class="mc-bar"><div class="mc-fill" style="background:var(--ios-orange); width:0%"></div></div><div class="mc-target" style="font-size:9px; color:var(--text3)">/ 0g</div></div>
    </div>

  </div>

  <div class="section-title" id="sec-title">计划执行</div>
  <div id="meal-list"></div>

  <div class="section-title">运动消耗</div>
  <div id="train-list"></div>
</div>
</div><!-- /page-main -->

<div class="footer-check"><button id="final-btn" class="confirm-btn">等待任务完成</button></div>

<!-- 运动页 -->
<div id="page-sport" class="page-view hidden">
  <div class="app-container">
    <div class="sport-tabs">
      <button class="sport-tab active" data-stab="workout">🏋️ 训练</button>
      <button class="sport-tab" data-stab="exercises">📚 动作库</button>
      <button class="sport-tab" data-stab="templates">📋 模板</button>
    </div>

    <div id="stab-workout" class="stab-content">
      <div id="workout-home">
        <div style="text-align:center; padding:30px 0 16px;">
          <div style="font-size:40px;">🏋️</div>
          <div style="font-size:16px; font-weight:500; margin:8px 0 4px;">开始训练</div>
          <div style="font-size:12px; color:var(--text3);">选择模板或空白开始</div>
        </div>
        <button class="primary-btn" id="start-blank-btn">空白训练</button>
        <div style="margin-top:16px;">
          <div style="font-size:11px; color:var(--text3); margin-bottom:8px; letter-spacing:1px;">我的模板</div>
          <div id="template-quick-list"></div>
        </div>
        <div style="margin-top:24px;">
          <div style="font-size:11px; color:var(--text3); margin-bottom:8px; letter-spacing:1px;">最近训练</div>
          <div id="recent-workout-list"></div>
        </div>
      </div>
      <div id="workout-session" class="hidden">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
          <button class="icon-btn" id="session-back">← 返回</button>
          <div id="session-title" style="font-size:16px; font-weight:500; flex:1;"></div>
          <div id="session-timer" style="font-family:var(--mono); color:var(--ios-blue); font-size:14px;">00:00</div>
        </div>
        <div id="session-exercises"></div>
        <button class="primary-btn" id="add-exercise-to-session" style="margin-top:12px; background:var(--glass); color:var(--text2); border:1px dashed var(--border-light);">+ 添加动作</button>
        <button class="primary-btn" id="finish-session-btn" style="margin-top:12px;">完成训练</button>
      </div>
    </div>

    <div id="stab-exercises" class="stab-content hidden">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div style="font-size:15px; font-weight:500;">动作库</div>
        <button class="icon-btn" id="add-category-btn">+ 大类</button>
      </div>
      <div id="exercise-category-list"></div>
    </div>

    <div id="stab-templates" class="stab-content hidden">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div style="font-size:15px; font-weight:500;">训练模板</div>
        <button class="icon-btn" id="add-template-btn">+ 模板</button>
      </div>
      <div id="template-list"></div>
    </div>
  </div>
</div>

<!-- 历史页 -->
<div id="page-history" class="page-view hidden">
  <div class="app-container" id="history-page-content"></div>
</div>

<!-- 分析页 -->
<div id="page-analysis" class="page-view hidden">
  <div class="app-container" id="analysis-page-content"></div>
</div>

<div id="train-overlay" class="overlay hidden">
    <div class="panel">
        <h2 id="train-modal-title" style="margin-bottom:8px; font-weight:400; font-size:20px;"></h2>
        <p style="font-size:12px; color:var(--text3); margin-bottom:15px;" id="train-modal-desc"></p>
        <div class="tag-container" id="tag-box"></div>
        <div class="quick-adj">
            <input type="number" id="train-modal-input" class="ios-input" placeholder="0">
            <div style="display:flex; flex-direction:column; gap:6px;">
                <button class="icon-btn" id="train-plus50">+50</button>
                <button class="icon-btn" id="train-minus50">-50</button>
            </div>
        </div>
        <button class="primary-btn" id="train-save">确认录入</button>
        <button id="train-close" style="width:100%; color:var(--text3); border:none; background:none; margin-top:18px; font-size:14px;">返回</button>
    </div>
</div>

<div id="base-overlay" class="overlay hidden">
    <div class="panel" id="base-panel-content"></div>
</div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/render.js"></script>
<script src="js/sport.js"></script>
<script src="js/main.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}
</script>
</body>
</html>
